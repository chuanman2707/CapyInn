name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PROJECT_PATH: mhm
  RELEASE_CONFIG_PATH: src-tauri/tauri.release.conf.json

jobs:
  verify-version:
    runs-on: ubuntu-22.04
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mhm/package-lock.json

      - name: Verify release versions and tag
        id: meta
        shell: bash
        working-directory: mhm
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          cargo_version="$(node <<'NODE'
          const fs = require("fs");
          const cargo = fs.readFileSync("./src-tauri/Cargo.toml", "utf8");
          const packageSection = cargo.match(/\[package\][\s\S]*?^version = "([^"]+)"/m);
          if (!packageSection) {
            throw new Error("Cargo package version not found");
          }
          process.stdout.write(packageSection[1]);
          NODE
          )"
          expected_tag="v${package_version}"

          if [ "$package_version" != "$tauri_version" ] || [ "$package_version" != "$cargo_version" ]; then
            echo "Version mismatch: package=${package_version}, tauri=${tauri_version}, cargo=${cargo_version}"
            exit 1
          fi

          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Expected tag ${expected_tag}, got ${GITHUB_REF_NAME}"
            exit 1
          fi

          if [[ "${package_version}" == *-* ]] || [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "app_version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

  verify-app:
    needs: verify-version
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mhm/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            mhm/src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: mhm
        run: npm ci

      - name: Run frontend tests
        working-directory: mhm
        run: npm test

      - name: Build frontend
        working-directory: mhm
        run: npm run build

      - name: Check Rust crate
        run: cargo check --manifest-path mhm/src-tauri/Cargo.toml

  build-windows:
    needs:
      - verify-version
      - verify-app
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mhm/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            mhm/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: mhm
        run: npm ci

      - name: Validate updater configuration
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY is required for release builds"
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_UPDATER_PUBLIC_KEY)) {
            Write-Error "TAURI_UPDATER_PUBLIC_KEY is required for generated updater config"
            exit 1
          }

      - name: Validate Windows signing secrets
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -and -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Error "WINDOWS_CERTIFICATE_PASSWORD is set but WINDOWS_CERTIFICATE is missing"
            exit 1
          }

          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -and [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Error "WINDOWS_CERTIFICATE is set but WINDOWS_CERTIFICATE_PASSWORD is missing"
            exit 1
          }

      - name: Import Windows signing certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            Write-Host "No Windows signing certificate configured, continuing with unsigned Windows bundle."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx | Out-Null
          Remove-Item certificate/tempCert.txt
          $cert = Import-PfxCertificate -FilePath certificate/certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)
          if (-not $cert) {
            Write-Error "Failed to import Windows signing certificate"
            exit 1
          }

          $thumbprint = ($cert | Select-Object -First 1).Thumbprint
          "WINDOWS_CERTIFICATE_THUMBPRINT=$thumbprint" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Prepare release config
        shell: bash
        working-directory: mhm
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ env.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const configPath = path.join("src-tauri", "tauri.conf.json");
          const releaseConfigPath = path.join("src-tauri", "tauri.release.conf.json");
          const config = JSON.parse(fs.readFileSync(configPath, "utf8"));

          config.bundle = {
            ...(config.bundle || {}),
            createUpdaterArtifacts: true,
          };

          config.plugins = {
            ...(config.plugins || {}),
            updater: {
              ...(config.plugins?.updater || {}),
              pubkey: process.env.TAURI_UPDATER_PUBLIC_KEY,
            },
          };

          if (process.env.WINDOWS_CERTIFICATE_THUMBPRINT) {
            config.bundle.windows = {
              ...(config.bundle.windows || {}),
              certificateThumbprint: process.env.WINDOWS_CERTIFICATE_THUMBPRINT,
              digestAlgorithm: "sha256",
              timestampUrl: process.env.WINDOWS_TIMESTAMP_URL || "http://timestamp.digicert.com",
            };
          }

          fs.writeFileSync(releaseConfigPath, `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Build Windows updater artifacts
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          args: --bundles nsis --config ${{ env.RELEASE_CONFIG_PATH }}

      - name: Collect Windows asset metadata
        shell: bash
        run: |
          mkdir -p release-assets/windows release-meta
          asset_file="$(find mhm/src-tauri/target/release/bundle/nsis -maxdepth 1 -name '*.exe' | head -n 1)"
          sig_file="$(find mhm/src-tauri/target/release/bundle/nsis -maxdepth 1 -name '*.sig' | head -n 1)"

          [ -n "$asset_file" ] && [ -n "$sig_file" ]

          cp "$asset_file" release-assets/windows/
          cp "$sig_file" release-assets/windows/

          cat > release-meta/windows-x86_64.json <<JSON
          {
            "platformKey": "windows-x86_64",
            "assetName": "$(basename "$asset_file")",
            "signature": "$(tr -d '\r\n' < "$sig_file")"
          }
          JSON

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release-assets/windows/*

      - name: Upload Windows release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-meta-windows
          path: release-meta/windows-x86_64.json

  build-linux-x86_64:
    needs:
      - verify-version
      - verify-app
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
