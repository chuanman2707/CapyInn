        env:
          APP_VERSION: ${{ needs.verify-version.outputs.app_version }}
        run: |
          mkdir -p release-assets/macos-aarch64 release-meta
          asset_file="$(find mhm/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app.tar.gz' | head -n 1)"
          sig_file="$(find mhm/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app.tar.gz.sig' | head -n 1)"
          dmg_file="$(find mhm/src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' | head -n 1)"

          [ -n "$asset_file" ] && [ -n "$sig_file" ] && [ -n "$dmg_file" ]

          updater_name="CapyInn_${APP_VERSION}_aarch64.app.tar.gz"
          updater_sig_name="${updater_name}.sig"
          dmg_name="CapyInn_${APP_VERSION}_aarch64.dmg"

          cp "$asset_file" "release-assets/macos-aarch64/${updater_name}"
          cp "$sig_file" "release-assets/macos-aarch64/${updater_sig_name}"
          cp "$dmg_file" "release-assets/macos-aarch64/${dmg_name}"

          cat > release-meta/darwin-aarch64.json <<JSON
          {
            "platformKey": "darwin-aarch64",
            "assetName": "${updater_name}",
            "signature": "$(tr -d '\r\n' < "$sig_file")"
          }
          JSON

      - name: Upload macOS Apple Silicon release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-aarch64
          path: release-assets/macos-aarch64/*

      - name: Upload macOS Apple Silicon release metadata
        uses: actions/upload-artifact@v4
